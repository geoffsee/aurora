<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bevyosc VJ</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="stage">
      <canvas id="bevy-canvas"></canvas>
      <p id="boot">Loading WebAssembly build from <code>dist/pkg</code>...</p>
    </main>

    <script type="module">
      const boot = document.querySelector("#boot");
      const OSC = {
        TEMPO: "/live/song/get/tempo",
        IS_PLAYING: "/live/song/get/is_playing",
        BEAT: "/live/song/get/beat",
        TRACK_DATA: "/live/song/get/track_data",
        CONNECTED: "/bevyosc/osc/connected",
        DEMO: "/bevyosc/demo/audio",
        DIAGNOSTICS: "/bevyosc/server/diagnostics",
      };
      const CONTROL = {
        STATE: "/bevyosc/control/state",
      };
      const oscState = {
        connected: false,
        bridgeReady: false,
        tempo: 120,
        playing: 0,
        beat: 0,
        lastBeatAt: 0,
        lastFrameAt: 0,
        lastMeterAt: 0,
        meters: new Array(16).fill(0),
        meterCount: 0,
        energy: 0,
        deckA: 0,
        deckB: 0,
        bass: 0,
        mid: 0,
        high: 0,
        previousEnergy: 0,
        lastEnvelopeAt: 0,
      };
      const controlState = {
        connected: false,
        lastFrameAt: 0,
        crossfade: 0.5,
        bpm: 124,
        speed: 1,
        intensity: 0.82,
        feedback: 0.35,
        depth: 0,
        palette: 0,
        deckAMode: 0,
        deckBMode: 1,
        rings: true,
        ringOpacity: 1,
        strobe: false,
        strobeLockout: true,
        blackout: false,
        freeze: false,
        maxBrightness: 0.9,
        beatSync: true,
        barSync: false,
        demoMode: false,
        replaying: false,
        flashVersion: 0,
        resetVersion: 0,
        cueVersion: 0,
        cueIntensity: 0,
        cuePalette: 0,
        cueCrossfade: 0.5,
        cueDeckAMode: 0,
        cueDeckBMode: 1,
        trackMapping: {
          deckAStart: 0,
          deckACount: 8,
          deckBStart: 8,
          deckBCount: 8,
          bassTrack: 0,
          midTrack: 1,
          highTrack: 2,
        },
      };
      const diagnostics = {
        sockets: 0,
        oscReady: false,
        oscActive: false,
        demoMode: false,
        replaying: false,
      };

      const METER_GAIN = 2.5;
      const clamp01 = (value) => Math.max(0, Math.min(1, Number(value) || 0));
      const clampInt = (value, min, max, fallback = min) => {
        const number = Number(value);
        return Math.max(min, Math.min(max, Math.floor(Number.isFinite(number) ? number : fallback)));
      };
      const average = (values) => (values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : 0);
      const mappedAverage = (meters, start, count) => average(meters.slice(start, start + Math.max(1, count)));
      const mappedTrack = (meters, index, fallback) => (Number.isFinite(meters[index]) ? meters[index] : fallback);
      const smoothSignal = (current, target, dtMs, attackMs, releaseMs) => {
        const timeMs = target > current ? attackMs : releaseMs;
        const blend = 1 - Math.exp(-dtMs / Math.max(1, timeMs));
        return current + (target - current) * blend;
      };

      function trackDataValueStart(args) {
        const fieldIndex = args.findIndex(
          (arg) => typeof arg === "string" && (arg === "track.output_meter_level" || arg.startsWith("track.")),
        );
        if (fieldIndex >= 0) return fieldIndex + 1;

        const allNumeric = args.every((arg) => Number.isFinite(Number(arg)));
        if (allNumeric && args.length >= 3) {
          const start = Number(args[0]);
          const count = Number(args[1]);
          if (Number.isInteger(start) && Number.isInteger(count) && count > 0 && count <= args.length - 2) {
            return 2;
          }
        }
        if (allNumeric && args.length <= Math.max(oscState.meterCount, 1)) return 0;

        return Math.min(2, args.length);
      }

      function decayMeters() {
        const age = performance.now() - oscState.lastMeterAt;
        if (!oscState.lastMeterAt || age < 350) return;

        const gain = Math.max(0, 1 - (age - 350) / 650);
        oscState.energy *= gain;
        oscState.deckA *= gain;
        oscState.deckB *= gain;
        oscState.bass *= gain;
        oscState.mid *= gain;
        oscState.high *= gain;
      }

      function recomputeEnergy() {
        const meters = oscState.meters
          .slice(0, oscState.meterCount)
          .map((value) => clamp01(clamp01(value) * METER_GAIN));
        const mapping = controlState.trackMapping;
        const avg = average(meters);
        const peak = Math.max(avg, ...meters);
        const energyTarget = peak * 0.72 + avg * 0.28;
        const deckATarget = mappedAverage(meters, mapping.deckAStart, mapping.deckACount);
        const deckBTarget = mappedAverage(meters, mapping.deckBStart, mapping.deckBCount);
        const transient = Math.max(0, energyTarget - oscState.previousEnergy);
        const now = performance.now();
        const dtMs = Math.max(16, Math.min(250, now - (oscState.lastEnvelopeAt || now)));

        oscState.energy = smoothSignal(oscState.energy, energyTarget, dtMs, 120, 280);
        oscState.deckA = smoothSignal(oscState.deckA, deckATarget || avg, dtMs, 140, 320);
        oscState.deckB = smoothSignal(oscState.deckB, deckBTarget || avg, dtMs, 140, 320);
        oscState.bass = smoothSignal(oscState.bass, mappedTrack(meters, mapping.bassTrack, energyTarget), dtMs, 260, 620);
        oscState.mid = smoothSignal(oscState.mid, mappedTrack(meters, mapping.midTrack, avg), dtMs, 150, 360);
        oscState.high = smoothSignal(
          oscState.high,
          Math.max(mappedTrack(meters, mapping.highTrack, 0), Math.min(1, transient * 2.2)),
          dtMs,
          90,
          260,
        );
        oscState.previousEnergy = energyTarget;
        oscState.lastEnvelopeAt = now;
      }

      function applyOscFrame(frame) {
        const address = frame?.address;
        const args = Array.isArray(frame?.args) ? frame.args : [];

        if (address === OSC.CONNECTED) {
          oscState.bridgeReady = Boolean(args[0]);
        } else if (address === OSC.DEMO) {
          applyDemoFrame(args[0]);
        } else if (address === OSC.DIAGNOSTICS && args[0] && typeof args[0] === "object") {
          Object.assign(diagnostics, args[0]);
        } else if (address === OSC.TEMPO) {
          oscState.lastFrameAt = performance.now();
          const tempo = Number(args[0]);
          if (Number.isFinite(tempo) && tempo > 1) oscState.tempo = tempo;
        } else if (address === OSC.IS_PLAYING) {
          oscState.lastFrameAt = performance.now();
          oscState.playing = args[0] ? 1 : 0;
        } else if (address === OSC.BEAT) {
          oscState.lastFrameAt = performance.now();
          const beat = Number(args[0]);
          oscState.beat = Number.isFinite(beat) ? beat : 0;
          oscState.lastBeatAt = performance.now();
        } else if (address === OSC.TRACK_DATA) {
          oscState.lastFrameAt = performance.now();
          const valueStart = trackDataValueStart(args);
          const meterStart = valueStart === 0 ? 0 : Math.max(0, Math.floor(Number(args[0]) || 0));
          oscState.meterCount = Math.max(oscState.meterCount, meterStart + Math.max(0, args.length - valueStart));

          for (let i = valueStart; i < args.length; i += 1) {
            oscState.meters[meterStart + i - valueStart] = clamp01(args[i]);
          }

          oscState.lastMeterAt = performance.now();
          recomputeEnergy();
        } else if (address === CONTROL.STATE) {
          applyControlState(args[0]);
        }
      }

      function applyDemoFrame(frame) {
        if (!controlState.demoMode || !frame || typeof frame !== "object") return;

        oscState.lastFrameAt = performance.now();
        oscState.lastMeterAt = performance.now();
        oscState.lastBeatAt = frame.pulse > 0.8 ? performance.now() : oscState.lastBeatAt;
        oscState.tempo = Number(frame.tempo) || controlState.bpm;
        oscState.beat = Number(frame.beat) || 0;
        oscState.playing = 1;
        oscState.energy = clamp01(frame.energy);
        oscState.deckA = clamp01(frame.deckA);
        oscState.deckB = clamp01(frame.deckB);
        oscState.bass = clamp01(frame.bass);
        oscState.mid = clamp01(frame.mid);
        oscState.high = clamp01(frame.high);
      }

      function applyControlState(next) {
        if (!next || typeof next !== "object") return;

        controlState.connected = true;
        controlState.lastFrameAt = performance.now();
        controlState.crossfade = clamp01(next.crossfade);
        controlState.bpm = Math.max(40, Math.min(240, Number(next.bpm) || controlState.bpm));
        controlState.speed = Math.max(0.1, Math.min(3, Number(next.speed) || controlState.speed));
        controlState.intensity = Math.max(0.05, Math.min(1.5, Number(next.intensity) || controlState.intensity));
        controlState.feedback = clamp01(next.feedback);
        controlState.depth = clamp01(next.depth);
        controlState.palette = clamp01(next.palette);
        controlState.deckAMode = clampInt(next.deckAMode, 0, 4, controlState.deckAMode);
        controlState.deckBMode = clampInt(next.deckBMode, 0, 4, controlState.deckBMode);
        controlState.rings = next.rings !== false;
        controlState.ringOpacity = next.ringOpacity === undefined ? controlState.ringOpacity : clamp01(next.ringOpacity);
        controlState.strobe = Boolean(next.strobe);
        controlState.strobeLockout = next.strobeLockout !== false;
        controlState.blackout = Boolean(next.blackout);
        controlState.freeze = Boolean(next.freeze);
        controlState.maxBrightness = Math.max(0.1, Math.min(1, Number(next.maxBrightness) || controlState.maxBrightness));
        controlState.beatSync = next.beatSync !== false;
        controlState.barSync = Boolean(next.barSync);
        controlState.demoMode = Boolean(next.demoMode);
        controlState.replaying = Boolean(next.replaying);
        controlState.flashVersion = Math.max(0, Math.floor(Number(next.flashVersion) || 0));
        controlState.resetVersion = Math.max(0, Math.floor(Number(next.resetVersion) || 0));
        controlState.cueVersion = Math.max(0, Math.floor(Number(next.cueVersion) || 0));
        controlState.cueIntensity = clamp01(next.cueIntensity);
        controlState.cuePalette = clamp01(next.cuePalette);
        controlState.cueCrossfade = clamp01(next.cueCrossfade);
        controlState.cueDeckAMode = clampInt(next.cueDeckAMode, 0, 4, controlState.cueDeckAMode);
        controlState.cueDeckBMode = clampInt(next.cueDeckBMode, 0, 4, controlState.cueDeckBMode);
        if (next.trackMapping && typeof next.trackMapping === "object") {
          controlState.trackMapping = {
            deckAStart: clampInt(next.trackMapping.deckAStart, 0, 31, controlState.trackMapping.deckAStart),
            deckACount: clampInt(next.trackMapping.deckACount, 1, 32, controlState.trackMapping.deckACount),
            deckBStart: clampInt(next.trackMapping.deckBStart, 0, 31, controlState.trackMapping.deckBStart),
            deckBCount: clampInt(next.trackMapping.deckBCount, 1, 32, controlState.trackMapping.deckBCount),
            bassTrack: clampInt(next.trackMapping.bassTrack, 0, 31, controlState.trackMapping.bassTrack),
            midTrack: clampInt(next.trackMapping.midTrack, 0, 31, controlState.trackMapping.midTrack),
            highTrack: clampInt(next.trackMapping.highTrack, 0, 31, controlState.trackMapping.highTrack),
          };
        }
      }

      let oscWs = null;

      function sendErrorToControls(description) {
        if (oscWs?.readyState === WebSocket.OPEN) {
          oscWs.send(JSON.stringify({ address: "/bevyosc/error", error: description, args: [] }));
        }
      }

      function connectOscSocket() {
        const scheme = location.protocol === "https:" ? "wss" : "ws";
        oscWs = new WebSocket(`${scheme}://${location.host}/ws`);

        oscWs.onopen = () => {
          oscState.bridgeReady = true;
        };
        oscWs.onclose = () => {
          oscState.connected = false;
          oscState.bridgeReady = false;
          setTimeout(connectOscSocket, 2000);
        };
        oscWs.onerror = () => {
          oscState.connected = false;
          oscState.bridgeReady = false;
        };
        oscWs.onmessage = (event) => {
          try {
            applyOscFrame(JSON.parse(event.data));
          } catch (error) {
            console.warn("bad OSC frame", error);
          }
        };
      }

      window.addEventListener("unhandledrejection", (event) => {
        const msg = event.reason instanceof Error ? event.reason.message : String(event.reason ?? "Unknown error");
        sendErrorToControls(`WASM panic: ${msg}`);
      });
      window.addEventListener("error", (event) => {
        const msg = event.error instanceof Error ? event.error.message : event.message;
        sendErrorToControls(`WASM runtime error: ${msg}`);
      });

      window.__bevyoscOscConnected = () => {
        oscState.connected = controlState.demoMode || performance.now() - oscState.lastFrameAt < 3000;
        return oscState.connected;
      };
      window.__bevyoscOscPlaying = () => Boolean(oscState.playing);
      window.__bevyoscOscTempo = () => oscState.tempo;
      window.__bevyoscOscEnergy = () => (decayMeters(), oscState.energy);
      window.__bevyoscOscDeckA = () => (decayMeters(), oscState.deckA);
      window.__bevyoscOscDeckB = () => (decayMeters(), oscState.deckB);
      window.__bevyoscOscBass = () => (decayMeters(), oscState.bass);
      window.__bevyoscOscMid = () => (decayMeters(), oscState.mid);
      window.__bevyoscOscHigh = () => (decayMeters(), oscState.high);
      window.__bevyoscOscPulse = () => {
        decayMeters();
        if (oscState.energy < 0.02) return 0;
        return Math.max(0, 1 - (performance.now() - oscState.lastBeatAt) / 180);
      };
      window.__bevyoscControlConnected = () => {
        controlState.connected = performance.now() - controlState.lastFrameAt < 3000;
        return controlState.connected;
      };
      window.__bevyoscControlCrossfade = () => controlState.crossfade;
      window.__bevyoscControlBpm = () => controlState.bpm;
      window.__bevyoscControlSpeed = () => controlState.speed;
      window.__bevyoscControlIntensity = () => controlState.intensity;
      window.__bevyoscControlFeedback = () => controlState.feedback;
      window.__bevyoscControlDepth = () => controlState.depth;
      window.__bevyoscControlPalette = () => controlState.palette;
      window.__bevyoscControlDeckAMode = () => controlState.deckAMode;
      window.__bevyoscControlDeckBMode = () => controlState.deckBMode;
      window.__bevyoscControlRings = () => controlState.rings;
      window.__bevyoscControlRingOpacity = () => controlState.ringOpacity;
      window.__bevyoscControlStrobe = () => controlState.strobe;
      window.__bevyoscControlStrobeLockout = () => controlState.strobeLockout;
      window.__bevyoscControlBlackout = () => controlState.blackout;
      window.__bevyoscControlFreeze = () => controlState.freeze;
      window.__bevyoscControlMaxBrightness = () => controlState.maxBrightness;
      window.__bevyoscControlBeatSync = () => controlState.beatSync;
      window.__bevyoscControlBarSync = () => controlState.barSync;
      window.__bevyoscControlDemoMode = () => controlState.demoMode;
      window.__bevyoscControlFlashVersion = () => controlState.flashVersion;
      window.__bevyoscControlResetVersion = () => controlState.resetVersion;
      window.__bevyoscControlCueVersion = () => controlState.cueVersion;
      window.__bevyoscControlCueIntensity = () => controlState.cueIntensity;
      window.__bevyoscControlCuePalette = () => controlState.cuePalette;
      window.__bevyoscControlCueCrossfade = () => controlState.cueCrossfade;
      window.__bevyoscControlCueDeckAMode = () => controlState.cueDeckAMode;
      window.__bevyoscControlCueDeckBMode = () => controlState.cueDeckBMode;
      window.__bevyoscDiagnostics = () => diagnostics;

      connectOscSocket();

      try {
        const { default: init } = await import("./dist/pkg/bevyosc.js");
        await init();
        boot?.remove();
      } catch (error) {
        console.error(error);
        const msg = error instanceof Error ? error.message : String(error);
        sendErrorToControls(`WASM init failed: ${msg}`);
        if (boot) {
          boot.innerHTML =
            "Could not load the WASM build. Run <code>bun run build:web</code>, then <code>bun run serve</code>.";
          boot.classList.add("error");
        }
      }
    </script>
  </body>
</html>
