<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bevyosc GPU palette</title>
    <link rel="icon" href="data:," />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        color: #fff;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #status {
        position: absolute;
        inset: auto 0 0 0;
        padding: 10px 14px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.6;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
      #status.error {
        color: #ff8a8a;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <canvas id="gpu-canvas"></canvas>
    <div id="status">booting WebGPU…</div>
    <script type="module">
      const canvas = document.getElementById("gpu-canvas");
      const statusEl = document.getElementById("status");

      const uniforms = {
        time: 0,
        pulse: 0,
        energy: 0,
        bass: 0,
        mid: 0,
        high: 0,
        palette: 0,
        intensity: 0.82,
        feedback: 0.35,
        depth: 0,
        crossfade: 0.5,
        flash: 0,
        modeA: 0,
        modeB: 1,
      };
      let lastParentAt = 0;

      window.addEventListener("message", (event) => {
        const data = event?.data;
        if (data && data.type === "bevyosc:uniforms" && data.uniforms) {
          Object.assign(uniforms, data.uniforms);
          lastParentAt = performance.now();
        }
      });

      function driveDemo(time) {
        if (performance.now() - lastParentAt < 1000) return;
        const beat = (time * 2) % 1;
        uniforms.energy = 0.45 + Math.sin(time * 1.3) * 0.25;
        uniforms.bass = 0.5 + Math.sin(time * 2.4) * 0.35;
        uniforms.mid = 0.45 + Math.sin(time * 3.1 + 1.4) * 0.3;
        uniforms.high = Math.max(0, Math.sin(time * 12)) * 0.8;
        uniforms.pulse = beat < 0.18 ? 1 : Math.max(0, 1 - beat / 0.42);
        uniforms.palette = (time * 0.04) % 1;
        uniforms.depth = 0.4 + Math.sin(time * 0.3) * 0.3;
        uniforms.modeA = Math.floor((time / 4) % 5);
        uniforms.modeB = Math.floor(((time + 2) / 4) % 5);
        uniforms.crossfade = 0.5 + Math.sin(time * 0.5) * 0.5;
      }

      async function boot() {
        if (!navigator.gpu) {
          throw new Error("WebGPU not available — try Chrome 113+ or Safari 18+");
        }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) throw new Error("No WebGPU adapter");
        const device = await adapter.requestDevice();
        const ctx = canvas.getContext("webgpu");
        const format = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device, format, alphaMode: "premultiplied" });

        const shaderResponse = await fetch("./assets/shaders/vj_palette.wgsl");
        if (!shaderResponse.ok) {
          throw new Error(`fetch shader: ${shaderResponse.status}`);
        }
        const shaderCode = await shaderResponse.text();
        const module = device.createShaderModule({ code: shaderCode });

        const pipeline = device.createRenderPipeline({
          layout: "auto",
          vertex: { module, entryPoint: "vs_main" },
          fragment: { module, entryPoint: "fs_main", targets: [{ format }] },
          primitive: { topology: "triangle-list" },
        });

        const uniformBuffer = device.createBuffer({
          size: 64,
          usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        });
        const uniformData = new Float32Array(16);

        const bindGroup = device.createBindGroup({
          layout: pipeline.getBindGroupLayout(0),
          entries: [{ binding: 0, resource: { buffer: uniformBuffer } }],
        });

        function resize() {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const w = Math.max(1, Math.floor(canvas.clientWidth * dpr));
          const h = Math.max(1, Math.floor(canvas.clientHeight * dpr));
          if (canvas.width !== w || canvas.height !== h) {
            canvas.width = w;
            canvas.height = h;
          }
        }

        const start = performance.now();
        function frame() {
          resize();
          const time = (performance.now() - start) / 1000;
          driveDemo(time);
          uniforms.time = time;

          uniformData[0] = canvas.width;
          uniformData[1] = canvas.height;
          uniformData[2] = uniforms.time;
          uniformData[3] = uniforms.pulse;
          uniformData[4] = uniforms.energy;
          uniformData[5] = uniforms.bass;
          uniformData[6] = uniforms.mid;
          uniformData[7] = uniforms.high;
          uniformData[8] = uniforms.palette;
          uniformData[9] = uniforms.intensity;
          uniformData[10] = uniforms.feedback;
          uniformData[11] = uniforms.depth;
          uniformData[12] = uniforms.crossfade;
          uniformData[13] = uniforms.flash;
          uniformData[14] = uniforms.modeA;
          uniformData[15] = uniforms.modeB;
          device.queue.writeBuffer(uniformBuffer, 0, uniformData);

          const encoder = device.createCommandEncoder();
          const pass = encoder.beginRenderPass({
            colorAttachments: [
              {
                view: ctx.getCurrentTexture().createView(),
                clearValue: { r: 0, g: 0, b: 0, a: 1 },
                loadOp: "clear",
                storeOp: "store",
              },
            ],
          });
          pass.setPipeline(pipeline);
          pass.setBindGroup(0, bindGroup);
          pass.draw(3);
          pass.end();
          device.queue.submit([encoder.finish()]);
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
        statusEl.remove();
      }

      boot().catch((error) => {
        console.error(error);
        statusEl.textContent = error.message ?? "WebGPU init failed";
        statusEl.classList.add("error");
      });
    </script>
  </body>
</html>
