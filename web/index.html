<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aurora VJ</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="stage">
      <canvas id="bevy-canvas"></canvas>
      <p id="boot">Loading WebAssembly build from <code>dist/pkg</code>...</p>
    </main>

    <script type="module">
      import {
        attachProjectorTransport,
        createProjectorTransport,
        mountGeoffseePagesNav,
        shouldRunStandaloneStaticDemo,
        shouldSubscribeBroadcastChannel,
        startStaticProjectorDemo,
      } from "./dist/projector-bridge.js";

      mountGeoffseePagesNav();

      const boot = document.querySelector("#boot");
      // Multi-output routing: a window opened with ?output=<id> renders the route
      // matching that id from ControlState.outputs. No param (or an unconfigured
      // id) falls back to "main" and renders the shared state unchanged.
      const OUTPUT_ID = (() => {
        const id = new URLSearchParams(location.search).get("output");
        return id && /^[A-Za-z0-9][A-Za-z0-9_-]{0,31}$/.test(id) ? id : "main";
      })();
      const OSC = {
        TEMPO: "/live/song/get/tempo",
        IS_PLAYING: "/live/song/get/is_playing",
        BEAT: "/live/song/get/beat",
        TRACK_DATA: "/live/song/get/track_data",
        CONNECTED: "/aurora/osc/connected",
        DEMO: "/aurora/demo/audio",
        BROWSER_AUDIO: "/aurora/audio/features",
        DIAGNOSTICS: "/aurora/server/diagnostics",
        DEV_RELOAD: "/aurora/dev/reload",
        SHADER_IMPORTED: "/aurora/shader/imported",
      };
      const CONTROL = {
        STATE: "/aurora/control/state",
      };
      const MAX_GPU_SHADER_INDEX = 35;
      const oscState = {
        connected: false,
        bridgeReady: false,
        tempo: 120,
        playing: 0,
        beat: 0,
        lastBeatAt: 0,
        lastFrameAt: 0,
        lastMeterAt: 0,
        meters: new Array(16).fill(0),
        meterCount: 0,
        energy: 0,
        deckA: 0,
        deckB: 0,
        bass: 0,
        mid: 0,
        high: 0,
        previousEnergy: 0,
        lastEnvelopeAt: 0,
      };
      const controlState = {
        connected: false,
        lastFrameAt: 0,
        crossfade: 0.5,
        bpm: 124,
        speed: 1,
        intensity: 0.82,
        feedback: 0.35,
        depth: 0,
        palette: 0,
        paletteR: 61 / 255,
        paletteG: 90 / 255,
        paletteB: 128 / 255,
        paletteSaturation: 1,
        paletteBrightness: 1,
        gridDensity: 0.5,
        gridDiamond: 0.5,
        gridLineWidth: 0.5,
        gridShapeMix: 0.5,
        deckAMode: 0,
        deckBMode: 1,
        rings: true,
        ringOpacity: 1,
        strobe: false,
        strobeLockout: false,
        blackout: false,
        freeze: false,
        maxBrightness: 0.9,
        showGpuPalette: false,
        beatSync: true,
        barSync: false,
        demoMode: false,
        replaying: false,
        flashVersion: 0,
        resetVersion: 0,
        cueVersion: 0,
        cueIntensity: 0,
        cuePalette: 0,
        cueCrossfade: 0.5,
        cueDeckAMode: 0,
        cueDeckBMode: 1,
        cueDeckAGpuShader: 1,
        cueDeckBGpuShader: 6,
        trackMapping: {
          deckAStart: 0,
          deckACount: 8,
          deckBStart: 8,
          deckBCount: 8,
          bassTrack: 0,
          midTrack: 1,
          highTrack: 2,
        },
        activeShader: 0,
        deckAGpuShader: 1,
        deckBGpuShader: 6,
        bandCurves: { energy: "linear", bass: "linear", mid: "linear", high: "linear" },
      };
      const diagnostics = {
        sockets: 0,
        oscReady: false,
        oscActive: false,
        demoMode: false,
        replaying: false,
      };

      const clamp01 = (value) => Math.max(0, Math.min(1, Number(value) || 0));
      const clampInt = (value, min, max, fallback = min) => {
        const number = Number(value);
        return Math.max(min, Math.min(max, Math.floor(Number.isFinite(number) ? number : fallback)));
      };
      const average = (values) => (values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : 0);
      const mappedAverage = (meters, start, count) => average(meters.slice(start, start + Math.max(1, count)));
      const mappedTrack = (meters, index, fallback) => (Number.isFinite(meters[index]) ? meters[index] : fallback);
      // Applies the selected curve shape to a [0,1] audio value.
      // exponential (x²): punchy — suppresses quiet signals, amplifies loud ones.
      // logarithmic (√x): ambient — lifts quiet signals, compresses loud ones.
      const applyAudioCurve = (value, curve) => {
        if (curve === "exponential") return value * value;
        if (curve === "logarithmic") return Math.sqrt(Math.max(0, value));
        return value; // linear
      };
      const VALID_CURVES = new Set(["linear", "exponential", "logarithmic"]);

      function trackDataValueStart(args) {
        const fieldIndex = args.findIndex(
          (arg) => typeof arg === "string" && (arg === "track.output_meter_level" || arg.startsWith("track.")),
        );
        if (fieldIndex >= 0) return fieldIndex + 1;

        const allNumeric = args.every((arg) => Number.isFinite(Number(arg)));
        if (allNumeric && args.length >= 3) {
          const start = Number(args[0]);
          const count = Number(args[1]);
          if (Number.isInteger(start) && Number.isInteger(count) && count > 0 && count <= args.length - 2) {
            return 2;
          }
        }
        if (allNumeric && args.length <= Math.max(oscState.meterCount, 1)) return 0;

        return Math.min(2, args.length);
      }

      function decayMeters() {
        const age = performance.now() - oscState.lastMeterAt;
        if (!oscState.lastMeterAt || age < 350) return;

        const gain = Math.max(0, 1 - (age - 350) / 650);
        oscState.energy *= gain;
        oscState.deckA *= gain;
        oscState.deckB *= gain;
        oscState.bass *= gain;
        oscState.mid *= gain;
        oscState.high *= gain;
      }

      function recomputeEnergy() {
        // Ableton track meters are often small (0.01-0.3). Apply a soft boost here
        // so they drive a good 0-1 range for the shaders without hard clipping
        // the loud parts (which used to make everything "flat" and unresponsive).
        const softBoost = (v) => {
          const g = clamp01(v) * 3.2;
          if (g <= 1) return g;
          // soft approach to 1.0 so loud parts stay distinguishable
          return 1 - 0.35 * Math.exp(-3 * (g - 1));
        };
        const meters = oscState.meters
          .slice(0, oscState.meterCount)
          .map((value) => softBoost(value));
        const mapping = controlState.trackMapping;
        const avg = average(meters);
        const peak = Math.max(avg, ...meters);
        const energyTarget = peak * 0.72 + avg * 0.28;
        const deckATarget = mappedAverage(meters, mapping.deckAStart, mapping.deckACount);
        const deckBTarget = mappedAverage(meters, mapping.deckBStart, mapping.deckBCount);
        const transient = Math.max(0, energyTarget - oscState.previousEnergy);
        // Assign boosted mapped values directly — no per-band smoothing on the Ableton
        // OSC path. High gets an extra transient spike for punchy onsets.
        const now = performance.now();
        const bassTarget = mappedTrack(meters, mapping.bassTrack, energyTarget);
        if (
          controlState.beatSync &&
          bassTarget > oscState.bass + 0.14 &&
          bassTarget > 0.22
        ) {
          oscState.lastBeatAt = now;
        }
        oscState.energy = energyTarget;
        oscState.deckA = deckATarget || avg;
        oscState.deckB = deckBTarget || avg;
        oscState.bass = bassTarget;
        oscState.mid = mappedTrack(meters, mapping.midTrack, avg);
        oscState.high = Math.max(
          mappedTrack(meters, mapping.highTrack, 0),
          Math.min(1, transient * 2.8),
        );
        oscState.previousEnergy = energyTarget;
        oscState.lastEnvelopeAt = now;
      }

      function applyOscFrame(frame) {
        const address = frame?.address;
        const args = Array.isArray(frame?.args) ? frame.args : [];

        if (address === OSC.CONNECTED) {
          oscState.bridgeReady = Boolean(args[0]);
        } else if (address === OSC.DEMO) {
          applyDemoFrame(args[0]);
        } else if (address === OSC.BROWSER_AUDIO) {
          applyBrowserAudioFrame(args[0]);
        } else if (address === OSC.DIAGNOSTICS && args[0] && typeof args[0] === "object") {
          Object.assign(diagnostics, args[0]);
        } else if (address === OSC.TEMPO) {
          oscState.lastFrameAt = performance.now();
          const tempo = Number(args[0]);
          if (Number.isFinite(tempo) && tempo > 1) oscState.tempo = tempo;
        } else if (address === OSC.IS_PLAYING) {
          oscState.lastFrameAt = performance.now();
          oscState.playing = args[0] ? 1 : 0;
        } else if (address === OSC.BEAT) {
          oscState.lastFrameAt = performance.now();
          const beat = Number(args[0]);
          oscState.beat = Number.isFinite(beat) ? beat : 0;
          oscState.lastBeatAt = performance.now();
        } else if (address === OSC.TRACK_DATA) {
          oscState.lastFrameAt = performance.now();
          const valueStart = trackDataValueStart(args);
          const meterStart = valueStart === 0 ? 0 : Math.max(0, Math.floor(Number(args[0]) || 0));
          oscState.meterCount = Math.max(oscState.meterCount, meterStart + Math.max(0, args.length - valueStart));

          for (let i = valueStart; i < args.length; i += 1) {
            oscState.meters[meterStart + i - valueStart] = clamp01(args[i]);
          }

          oscState.lastMeterAt = performance.now();
          recomputeEnergy();
        } else if (address === CONTROL.STATE) {
          applyControlState(args[0]);
        } else if (address === OSC.DEV_RELOAD) {
          handleHotReload();
        } else if (address === OSC.SHADER_IMPORTED) {
          handleImportedShader(args[0]);
        }
      }

      let pendingImportedShader = null;
      function handleImportedShader(payload) {
        if (!payload || typeof payload !== "object" || typeof payload.wgsl !== "string") return;
        pendingImportedShader = payload.wgsl;
      }

      function applyDemoFrame(frame) {
        if (!controlState.demoMode || !frame || typeof frame !== "object") return;

        oscState.lastFrameAt = performance.now();
        oscState.lastMeterAt = performance.now();
        oscState.lastBeatAt = frame.pulse > 0.8 ? performance.now() : oscState.lastBeatAt;
        oscState.tempo = Number(frame.tempo) || controlState.bpm;
        oscState.beat = Number(frame.beat) || 0;
        oscState.playing = 1;
        oscState.energy = clamp01(frame.energy);
        oscState.deckA = clamp01(frame.deckA);
        oscState.deckB = clamp01(frame.deckB);
        oscState.bass = clamp01(frame.bass);
        oscState.mid = clamp01(frame.mid);
        oscState.high = clamp01(frame.high);
      }

      function applyBrowserAudioFrame(frame) {
        if (!frame || typeof frame !== "object") return;

        const now = performance.now();
        const energy = clamp01(frame.energy);
        const pulse = clamp01(frame.pulse);
        const bass = clamp01(frame.bass);
        const prevBass = oscState.bass;
        oscState.lastFrameAt = now;
        oscState.lastMeterAt = now;
        if (controlState.beatSync) {
          if (pulse > 0.55 || (bass > prevBass + 0.12 && bass > 0.2)) {
            oscState.lastBeatAt = now;
          }
        } else if (pulse > 0.8) {
          oscState.lastBeatAt = now;
        }
        oscState.tempo = controlState.bpm;
        oscState.playing = 1;
        oscState.energy = energy;
        oscState.deckA = energy;
        oscState.deckB = energy;
        oscState.bass = bass;
        oscState.mid = clamp01(frame.mid);
        oscState.high = clamp01(frame.high);
        oscState.previousEnergy = energy;
        oscState.lastEnvelopeAt = now;
      }

      function applyControlState(next) {
        if (!next || typeof next !== "object") return;

        controlState.connected = true;
        controlState.lastFrameAt = performance.now();
        controlState.crossfade = clamp01(next.crossfade);
        controlState.bpm = Math.max(40, Math.min(240, Number(next.bpm) || controlState.bpm));
        controlState.speed = Math.max(0.1, Math.min(3, Number(next.speed) || controlState.speed));
        controlState.intensity = Math.max(0.05, Math.min(1.5, Number(next.intensity) || controlState.intensity));
        controlState.feedback = clamp01(next.feedback);
        controlState.depth = clamp01(next.depth);
        controlState.palette = clamp01(next.palette);
        controlState.paletteR = next.paletteR === undefined ? controlState.paletteR : clamp01(next.paletteR);
        controlState.paletteG = next.paletteG === undefined ? controlState.paletteG : clamp01(next.paletteG);
        controlState.paletteB = next.paletteB === undefined ? controlState.paletteB : clamp01(next.paletteB);
        controlState.paletteSaturation = next.paletteSaturation === undefined ? controlState.paletteSaturation : clamp01(next.paletteSaturation);
        controlState.paletteBrightness = next.paletteBrightness === undefined ? controlState.paletteBrightness : clamp01(next.paletteBrightness);
        controlState.gridDensity = next.gridDensity === undefined ? controlState.gridDensity : clamp01(next.gridDensity);
        controlState.gridDiamond = next.gridDiamond === undefined ? controlState.gridDiamond : clamp01(next.gridDiamond);
        controlState.gridLineWidth = next.gridLineWidth === undefined ? controlState.gridLineWidth : clamp01(next.gridLineWidth);
        controlState.gridShapeMix = next.gridShapeMix === undefined ? controlState.gridShapeMix : clamp01(next.gridShapeMix);
        controlState.deckAMode = clampInt(next.deckAMode, 0, 23, controlState.deckAMode);
        controlState.deckBMode = clampInt(next.deckBMode, 0, 23, controlState.deckBMode);
        controlState.deckAGpuShader = clampInt(next.deckAGpuShader, 0, MAX_GPU_SHADER_INDEX, controlState.deckAGpuShader);
        controlState.deckBGpuShader = clampInt(next.deckBGpuShader, 0, MAX_GPU_SHADER_INDEX, controlState.deckBGpuShader);
        controlState.rings = next.rings !== false;
        controlState.ringOpacity = next.ringOpacity === undefined ? controlState.ringOpacity : clamp01(next.ringOpacity);
        controlState.strobe = Boolean(next.strobe);
        controlState.strobeLockout = Boolean(next.strobeLockout);
        controlState.blackout = Boolean(next.blackout);
        controlState.freeze = Boolean(next.freeze);
        controlState.maxBrightness = next.maxBrightness === undefined
          ? controlState.maxBrightness
          : Math.max(0, Math.min(1, Number(next.maxBrightness)));
        controlState.showGpuPalette = Boolean(next.showGpuPalette);
        controlState.beatSync = next.beatSync !== false;
        controlState.barSync = Boolean(next.barSync);
        controlState.demoMode = Boolean(next.demoMode);
        controlState.replaying = Boolean(next.replaying);
        controlState.flashVersion = Math.max(0, Math.floor(Number(next.flashVersion) || 0));
        controlState.resetVersion = Math.max(0, Math.floor(Number(next.resetVersion) || 0));
        controlState.cueVersion = Math.max(0, Math.floor(Number(next.cueVersion) || 0));
        controlState.cueIntensity = clamp01(next.cueIntensity);
        controlState.cuePalette = clamp01(next.cuePalette);
        controlState.cueCrossfade = clamp01(next.cueCrossfade);
        controlState.cueDeckAMode = clampInt(next.cueDeckAMode, 0, 23, controlState.cueDeckAMode);
        controlState.cueDeckBMode = clampInt(next.cueDeckBMode, 0, 23, controlState.cueDeckBMode);
        controlState.cueDeckAGpuShader = clampInt(next.cueDeckAGpuShader, 0, MAX_GPU_SHADER_INDEX, controlState.cueDeckAGpuShader);
        controlState.cueDeckBGpuShader = clampInt(next.cueDeckBGpuShader, 0, MAX_GPU_SHADER_INDEX, controlState.cueDeckBGpuShader);
        controlState.activeShader = clampInt(next.activeShader, 0, MAX_GPU_SHADER_INDEX, controlState.activeShader);
        if (next.bandCurves && typeof next.bandCurves === "object") {
          const bc = next.bandCurves;
          controlState.bandCurves = {
            energy: VALID_CURVES.has(bc.energy) ? bc.energy : "linear",
            bass: VALID_CURVES.has(bc.bass) ? bc.bass : "linear",
            mid: VALID_CURVES.has(bc.mid) ? bc.mid : "linear",
            high: VALID_CURVES.has(bc.high) ? bc.high : "linear",
          };
        }
        if (next.trackMapping && typeof next.trackMapping === "object") {
          controlState.trackMapping = {
            deckAStart: clampInt(next.trackMapping.deckAStart, 0, 31, controlState.trackMapping.deckAStart),
            deckACount: clampInt(next.trackMapping.deckACount, 1, 32, controlState.trackMapping.deckACount),
            deckBStart: clampInt(next.trackMapping.deckBStart, 0, 31, controlState.trackMapping.deckBStart),
            deckBCount: clampInt(next.trackMapping.deckBCount, 1, 32, controlState.trackMapping.deckBCount),
            bassTrack: clampInt(next.trackMapping.bassTrack, 0, 31, controlState.trackMapping.bassTrack),
            midTrack: clampInt(next.trackMapping.midTrack, 0, 31, controlState.trackMapping.midTrack),
            highTrack: clampInt(next.trackMapping.highTrack, 0, 31, controlState.trackMapping.highTrack),
          };
        }
        applyOutputRoute(next.outputs);
      }

      // Override the shared control state with this window's per-output route.
      // outputs arrive already normalized from the bridge (coerceControlState →
      // normalizeOutputRoutes); a null override means "inherit". A disabled output
      // is blacked out. Mirrors resolveOutputView in output-routing.ts.
      function applyOutputRoute(outputs) {
        if (!Array.isArray(outputs)) return;
        const route = outputs.find((o) => o && o.id === OUTPUT_ID);
        if (!route) return;
        if (route.enabled === false) {
          controlState.blackout = true;
          return;
        }
        if (typeof route.crossfade === "number") controlState.crossfade = clamp01(route.crossfade);
        if (typeof route.palette === "number") controlState.palette = clamp01(route.palette);
        if (typeof route.activeShader === "number") {
          controlState.activeShader = clampInt(route.activeShader, 0, MAX_GPU_SHADER_INDEX, controlState.activeShader);
        }
      }

      function handleHotReload() {
        console.log("[hot-reload] WASM package changed, reloading page...");
        location.reload();
      }

      let bridgeTransport = null;
      let staticProjectorDemo = null;

      function sendErrorToControls(description) {
        bridgeTransport?.send({
          address: "/aurora/error",
          error: description,
          args: [],
        });
      }

      function connectBridgeTransport() {
        bridgeTransport = createProjectorTransport();
        attachProjectorTransport(bridgeTransport, {
          onOpen: () => {
            oscState.bridgeReady = true;
          },
          onClose: () => {
            oscState.connected = false;
            oscState.bridgeReady = false;
          },
          onError: () => {
            oscState.connected = false;
            oscState.bridgeReady = false;
          },
          onMessage: (frame) => {
            if (shouldSubscribeBroadcastChannel()) {
              staticProjectorDemo?.notifyBridgeActivity();
            }
            applyOscFrame(frame);
          },
        });
      }

      window.addEventListener("unhandledrejection", (event) => {
        const msg = event.reason instanceof Error ? event.reason.message : String(event.reason ?? "Unknown error");
        sendErrorToControls(`Unhandled rejection: ${msg}`);
      });
      window.addEventListener("error", (event) => {
        const msg = event.error instanceof Error ? event.error.message : (event.message || 'Unknown error');
        sendErrorToControls(`Runtime error: ${msg}`);
      });

      window.__auroraOscConnected = () => {
        oscState.connected = controlState.demoMode || performance.now() - oscState.lastFrameAt < 3000;
        return oscState.connected;
      };
      window.__auroraOscPlaying = () => Boolean(oscState.playing);
      window.__auroraOscTempo = () => oscState.tempo;
      window.__auroraOscEnergy = () => (decayMeters(), applyAudioCurve(oscState.energy, controlState.bandCurves.energy));
      window.__auroraOscDeckA = () => (decayMeters(), oscState.deckA);
      window.__auroraOscDeckB = () => (decayMeters(), oscState.deckB);
      window.__auroraOscBass = () => (decayMeters(), applyAudioCurve(oscState.bass, controlState.bandCurves.bass));
      window.__auroraOscMid = () => (decayMeters(), applyAudioCurve(oscState.mid, controlState.bandCurves.mid));
      window.__auroraOscHigh = () => (decayMeters(), applyAudioCurve(oscState.high, controlState.bandCurves.high));
      window.__auroraOscPulse = () => {
        decayMeters();
        if (oscState.energy < 0.02) return 0;
        if (controlState.beatSync) {
          const beatMs = Math.max(200, (60 / Math.max(controlState.bpm, 40)) * 1000 * 0.38);
          const age = performance.now() - oscState.lastBeatAt;
          const t = Math.min(1, age / beatMs);
          return Math.max(0, 1 - t * t);
        }
        return applyAudioCurve(oscState.bass, controlState.bandCurves.bass);
      };
      window.__auroraControlConnected = () => {
        controlState.connected = performance.now() - controlState.lastFrameAt < 3000;
        return controlState.connected;
      };
      window.__auroraControlCrossfade = () => controlState.crossfade;
      window.__auroraControlBpm = () => controlState.bpm;
      window.__auroraControlSpeed = () => controlState.speed;
      window.__auroraControlIntensity = () => controlState.intensity;
      window.__auroraControlFeedback = () => controlState.feedback;
      window.__auroraControlDepth = () => controlState.depth;
      window.__auroraControlPalette = () => controlState.palette;
      window.__auroraControlPaletteR = () => controlState.paletteR;
      window.__auroraControlPaletteG = () => controlState.paletteG;
      window.__auroraControlPaletteB = () => controlState.paletteB;
      window.__auroraControlPaletteSaturation = () => controlState.paletteSaturation;
      window.__auroraControlPaletteBrightness = () => controlState.paletteBrightness;
      window.__auroraControlGridDensity = () => controlState.gridDensity;
      window.__auroraControlGridDiamond = () => controlState.gridDiamond;
      window.__auroraControlGridLineWidth = () => controlState.gridLineWidth;
      window.__auroraControlGridShapeMix = () => controlState.gridShapeMix;
      window.__auroraControlDeckAMode = () => controlState.deckAMode;
      window.__auroraControlDeckBMode = () => controlState.deckBMode;
      window.__auroraControlRings = () => controlState.rings;
      window.__auroraControlRingOpacity = () => controlState.ringOpacity;
      window.__auroraControlStrobe = () => controlState.strobe;
      window.__auroraControlStrobeLockout = () => controlState.strobeLockout;
      window.__auroraControlBlackout = () => controlState.blackout;
      window.__auroraControlFreeze = () => controlState.freeze;
      window.__auroraControlMaxBrightness = () => controlState.maxBrightness;
      window.__auroraControlShowGpuPalette = () => controlState.showGpuPalette;
      window.__auroraControlBeatSync = () => controlState.beatSync;
      window.__auroraControlBarSync = () => controlState.barSync;
      window.__auroraControlDemoMode = () => controlState.demoMode;
      window.__auroraControlFlashVersion = () => controlState.flashVersion;
      window.__auroraControlResetVersion = () => controlState.resetVersion;
      window.__auroraControlCueVersion = () => controlState.cueVersion;
      window.__auroraControlCueIntensity = () => controlState.cueIntensity;
      window.__auroraControlCuePalette = () => controlState.cuePalette;
      window.__auroraControlCueCrossfade = () => controlState.cueCrossfade;
      window.__auroraControlCueDeckAMode = () => controlState.cueDeckAMode;
      window.__auroraControlCueDeckBMode = () => controlState.cueDeckBMode;
      window.__auroraControlCueDeckAGpuShader = () => controlState.cueDeckAGpuShader;
      window.__auroraControlCueDeckBGpuShader = () => controlState.cueDeckBGpuShader;
      window.__auroraControlDeckAGpuShader = () => controlState.deckAGpuShader;
      window.__auroraControlDeckBGpuShader = () => controlState.deckBGpuShader;
      window.__auroraControlActiveShader = () => controlState.activeShader;
      window.__auroraTakePendingImportedShader = () => {
        const wgsl = pendingImportedShader;
        pendingImportedShader = null;
        return wgsl;
      };
      window.__auroraDiagnostics = () => diagnostics;

      if (shouldRunStandaloneStaticDemo()) {
        controlState.demoMode = true;
      }

      connectBridgeTransport();

      staticProjectorDemo = startStaticProjectorDemo(
        () => controlState.bpm,
        (demo) => applyDemoFrame(demo),
        {
          onFallbackDemo: () => {
            controlState.demoMode = true;
          },
        },
      );

      try {
        const { default: init } = await import("./dist/pkg/aurora.js");
        await init();
        boot?.remove();
      } catch (error) {
        console.error(error);
        const msg = error instanceof Error ? error.message : String(error);
        sendErrorToControls(`WASM init failed: ${msg}`);
        if (boot) {
          boot.innerHTML =
            "Could not load the WASM build. Run <code>bun run build:web</code>, then <code>bun run serve</code>.";
          boot.classList.add("error");
        }
      }
    </script>
  </body>
</html>
